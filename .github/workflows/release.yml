name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, json, mbstring, curl, zip, gd, openssl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --quiet

      - name: Read version
        id: ver
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Build ZIP
        run: |
          dev/build.sh
          echo "ZIP=release/dashboard-v3-${{ steps.ver.outputs.version }}.zip" >> $GITHUB_ENV

      - name: Read changelog from manifest
        id: changelog
        run: |
          CHANGELOG=$(php -r "echo json_decode(file_get_contents('manifest.json'),true)['changelog'] ?? '';")
          # Changelogs are multi-line; a bare key=value would break $GITHUB_OUTPUT.
          {
            echo 'text<<CHANGELOG_EOF'
            echo "${CHANGELOG}"
            echo 'CHANGELOG_EOF'
          } >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Dashboard v3 — ${{ steps.ver.outputs.tag }}"
          body: ${{ steps.changelog.outputs.text }}
          files: ${{ env.ZIP }}
          token: ${{ secrets.GITHUB_TOKEN }}
