<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — Quản lý kinh doanh đa sàn</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />

<script>
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "violet",
  "theme": "light",
  "density": "spacious",
  "chartStyle": "line"
}/*EDITMODE-END*/;
</script>

<script src="data.js"></script>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script>
window.addEventListener('error', function(e){
  document.body.insertAdjacentHTML('beforeend',
    '<div style="position:fixed;bottom:8px;left:8px;right:8px;background:#fee;color:#900;padding:10px;border-radius:6px;font:12px monospace;z-index:99999;white-space:pre-wrap">[Beta] ' + (e.message || 'unknown error') + (e.filename ? '\n@ '+e.filename+':'+e.lineno : '') + '</div>');
});
setTimeout(function(){
  if (!window.React) document.body.insertAdjacentHTML('beforeend','<div style="position:fixed;bottom:8px;left:8px;right:8px;background:#fee;color:#900;padding:10px;border-radius:6px;font:12px monospace;z-index:99999">[Beta] React CDN chưa load. Kiểm tra kết nối tới unpkg.com.</div>');
  else if (!window.Babel) document.body.insertAdjacentHTML('beforeend','<div style="position:fixed;bottom:8px;left:8px;right:8px;background:#fee;color:#900;padding:10px;border-radius:6px;font:12px monospace;z-index:99999">[Beta] Babel CDN chưa load.</div>');
  else if (!window.DASHBOARD_DATA) document.body.insertAdjacentHTML('beforeend','<div style="position:fixed;bottom:8px;left:8px;right:8px;background:#fee;color:#900;padding:10px;border-radius:6px;font:12px monospace;z-index:99999">[Beta] data.php không trả về dữ liệu. Mở /beta/data.php trực tiếp để xem chi tiết.</div>');
}, 4000);
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" src="pages2.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
