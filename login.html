<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập · Zott Monte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/theme.css?v=20">
  <style>
    body { display: grid; place-items: center; min-height: 100vh; padding: 20px; background: var(--surface-0); }
    .login-box { width: 100%; max-width: 400px; }
    .login-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 32px; box-shadow: var(--shadow); }
    .login-brand { text-align: center; margin-bottom: 28px; }
    .login-mark { width: 48px; height: 48px; margin: 0 auto 12px; padding: 8px; background: var(--brand); color: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .login-mark svg { width: 32px; height: 32px; }
    .login-title { font-size: 18px; font-weight: 700; color: var(--ink-0); margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--ink-3); }
    .form-row { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-2); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 10px 12px; font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface-2); color: var(--ink-0); font-family: inherit; transition: border-color 0.2s; }
    .form-input:focus { outline: none; border-color: var(--brand); background: var(--surface-1); }
    .form-error { display: none; font-size: 12px; color: var(--neg); margin-top: 6px; }
    .form-error.show { display: block; }
    .login-btn { width: 100%; padding: 10px 12px; margin-top: 20px; font-size: 13px; font-weight: 600; border: 1px solid var(--brand); border-radius: 6px; background: var(--brand); color: #fff; cursor: pointer; transition: opacity 0.2s; }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:active { opacity: 0.8; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-info { text-align: center; font-size: 12px; color: var(--ink-3); margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
    .demo-creds { margin-top: 12px; font-size: 11px; color: var(--ink-4); font-family: "JetBrains Mono", monospace; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 17.5 9 11l4 4 8-9"/>
            <path d="M21 6v5h-5"/>
          </svg>
        </div>
        <div class="login-title">Zott Monte</div>
        <div class="login-sub">Marketplace Analytics</div>
      </div>

      <form id="loginForm">
        <div class="form-row">
          <label class="form-label">Tên đăng nhập</label>
          <input type="text" id="username" class="form-input" placeholder="admin" autocomplete="username" autofocus required>
          <div class="form-error" id="usernameError"></div>
        </div>

        <div class="form-row">
          <label class="form-label">Mật khẩu</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
          <div class="form-error" id="passwordError"></div>
        </div>

        <div class="form-error show" id="generalError" style="display:none;margin-bottom:12px"></div>

        <button type="submit" class="login-btn" id="submitBtn">Đăng nhập</button>
      </form>

      <div class="login-info">
        Hệ thống quản lý phân tích dữ liệu kinh doanh<br>
        <div class="demo-creds" id="demoCreds"></div>
      </div>
    </div>
  </div>

  <script>
    // Check if auth is enabled via a simple GET to api/auth.php
    // If logged in, redirect to main app. If not, show login form.
    async function initLogin() {
      try {
        const res = await fetch('api/auth.php', { credentials: 'same-origin' });
        const data = await res.json();

        // If we're authenticated, redirect to app
        if (data.logged_in && data.user) {
          window.location.href = '/';
          return;
        }
      } catch (e) {
        console.error('Auth check failed:', e);
      }

      // Show login form
      setupLoginForm();
    }

    function setupLoginForm() {
      const form = document.getElementById('loginForm');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submitBtn');
      const generalError = document.getElementById('generalError');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearErrors();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username) {
          showError('usernameError', 'Vui lòng nhập tên đăng nhập');
          return;
        }
        if (!password) {
          showError('passwordError', 'Vui lòng nhập mật khẩu');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Đang xử lý...';

        try {
          const res = await fetch('api/auth.php', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          const data = await res.json();

          if (!res.ok || !data.success) {
            throw new Error(data.error || `HTTP ${res.status}`);
          }

          // Login successful, redirect to app
          window.location.href = '/';
        } catch (error) {
          showError('generalError', error.message || 'Đăng nhập thất bại. Vui lòng thử lại.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Đăng nhập';
          passwordInput.value = '';
          passwordInput.focus();
        }
      });

      // Show demo credentials if in development
      const demoCreds = document.getElementById('demoCreds');
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        demoCreds.textContent = 'Demo: admin / admin123';
      }
    }

    function showError(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.classList.add('show');
    }

    function clearErrors() {
      document.querySelectorAll('.form-error').forEach(el => {
        el.classList.remove('show');
        el.textContent = '';
      });
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', initLogin);
  </script>
</body>
</html>
